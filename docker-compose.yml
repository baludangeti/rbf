services:
  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: rbf-api-gateway
    ports:
      - "9100:9100"
    environment:
      GATEWAY_JWT_SECRET: change-this-secret-to-at-least-32-characters
      GATEWAY_ROUTES_AUTH_TARGET_URL: http://auth-service:9104/api/auth
      GATEWAY_ROUTES_PRODUCTS_TARGET_URL: http://product-service:9102/api/products
      GATEWAY_ROUTES_BILLING_TARGET_URL: http://billing-service:9105/api/billing
      GATEWAY_ROUTES_INVENTORY_TARGET_URL: http://inventory-service:9106/api/inventory
      GATEWAY_ROUTES_PURCHASES_TARGET_URL: http://purchase-service:9109/api/purchases
      GATEWAY_ROUTES_SALES_RETURNS_TARGET_URL: http://sales-return-service:9110/api/sales-returns
      GATEWAY_ROUTES_CUSTOMER_CREDITS_TARGET_URL: http://customer-credit-service:9111/api/customer-credits
      GATEWAY_ROUTES_TAX_TARGET_URL: http://tax-service:9112/tax
      GATEWAY_ROUTES_REPORTS_TARGET_URL: http://report-service:9113/api/reports
      GATEWAY_ROUTES_ACCOUNTING_TARGET_URL: http://accounting-service:9107/api/accounting
    depends_on:
      - auth-service
      - product-service
      - billing-service
      - inventory-service
      - payment-service
      - tax-service
      - report-service
    networks:
      - rbf-network

  auth-service:
    build:
      context: .
      dockerfile: auth-service/Dockerfile
    container_name: rbf-auth-service
    ports:
      - "9104:9104"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://auth-mysql:3306/rbf_auth?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: rbf
      SPRING_DATASOURCE_PASSWORD: rbf_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      JWT_SECRET: change-this-secret-to-at-least-32-characters
      JWT_EXPIRATION_MINUTES: 480
    depends_on:
      auth-mysql:
        condition: service_healthy
    networks:
      - rbf-network

  auth-mysql:
    image: mysql:8.0
    container_name: rbf-auth-mysql
    environment:
      MYSQL_DATABASE: rbf_auth
      MYSQL_USER: rbf
      MYSQL_PASSWORD: rbf_password
      MYSQL_ROOT_PASSWORD: root_password
    volumes:
      - auth-mysql-data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - rbf-network

  organization-service:
    build:
      context: .
      dockerfile: organization-service/Dockerfile
    container_name: rbf-organization-service
    ports:
      - "9101:9101"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://organization-mysql:3306/rbf_organization?useSSL=false&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: rbf
      SPRING_DATASOURCE_PASSWORD: rbf_password
      SPRING_DATASOURCE_DRIVER_CLASS_NAME: com.mysql.cj.jdbc.Driver
      SPRING_JPA_DATABASE_PLATFORM: org.hibernate.dialect.MySQLDialect
      SERVICES_AUTH_SERVICE_BASE_URL: http://auth-service:9104
    depends_on:
      organization-mysql:
        condition: service_healthy
      auth-service:
        condition: service_started
    networks:
      - rbf-network

